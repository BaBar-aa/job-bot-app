<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ажлын тохиргоо</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
  background: #0f172a;
  color: #f1f5f9;
  padding-bottom: 100px;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 100%;
  background: 
    radial-gradient(ellipse at top, rgba(99, 102, 241, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(236, 72, 153, 0.2) 0%, transparent 50%),
    radial-gradient(ellipse at bottom left, rgba(16, 185, 129, 0.2) 0%, transparent 50%);
  z-index: 0;
  pointer-events: none;
}

.hero {
  position: relative;
  z-index: 1;
  padding: 32px 20px 24px;
  text-align: center;
}

.hero-badge {
  display: inline-block;
  padding: 6px 14px;
  background: rgba(99, 102, 241, 0.15);
  border: 1px solid rgba(99, 102, 241, 0.3);
  border-radius: 24px;
  font-size: 12px;
  color: #a5b4fc;
  margin-bottom: 16px;
  backdrop-filter: blur(10px);
}

.hero h1 {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.hero-subtitle {
  color: #94a3b8;
  font-size: 14px;
  line-height: 1.5;
}

.content {
  position: relative;
  z-index: 1;
  padding: 0 16px;
}

.card {
  background: rgba(30, 41, 59, 0.5);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(148, 163, 184, 0.1);
  border-radius: 24px;
  padding: 22px;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

.card-icon {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  color: #f1f5f9;
  flex: 1;
}

.counter {
  background: rgba(99, 102, 241, 0.2);
  color: #a5b4fc;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  min-width: 32px;
  text-align: center;
}

.chip-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  padding: 10px 16px;
  border: 1px solid rgba(148, 163, 184, 0.2);
  border-radius: 20px;
  background: rgba(15, 23, 42, 0.5);
  color: #cbd5e1;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s ease;
  user-select: none;
}

.chip:active {
  transform: scale(0.95);
}

.chip.active {
  background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.5);
}

.salary-display {
  text-align: center;
  font-size: 36px;
  font-weight: 800;
  margin: 12px 0 20px;
  background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}

.slider-container {
  padding: 0 4px;
}

.salary-slider {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: rgba(148, 163, 184, 0.2);
  appearance: none;
  outline: none;
}

.salary-slider::-webkit-slider-thumb {
  appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.5);
  border: 3px solid #0f172a;
}

.salary-range {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 11px;
  color: #64748b;
}

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.toggle-info {
  flex: 1;
}

.toggle-label {
  font-size: 15px;
  font-weight: 600;
  color: #f1f5f9;
  margin-bottom: 4px;
}

.toggle-desc {
  font-size: 12px;
  color: #94a3b8;
}

.toggle {
  width: 56px;
  height: 32px;
  background: rgba(148, 163, 184, 0.2);
  border-radius: 16px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
  flex-shrink: 0;
}

.toggle.active {
  background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
}

.toggle::after {
  content: '';
  position: absolute;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: white;
  top: 3px;
  left: 3px;
  transition: left 0.3s;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
}

.toggle.active::after {
  left: 27px;
}

.submit-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px;
  background: linear-gradient(180deg, transparent 0%, rgba(15, 23, 42, 0.95) 30%);
  backdrop-filter: blur(20px);
  z-index: 10;
}

.submit-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(99, 102, 241, 0.5);
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.submit-btn:active {
  transform: scale(0.97);
}

.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">⚡ AI-аар тохирох ажил</div>
  <h1>Ажлын тохиргоо</h1>
  <p class="hero-subtitle">Танд яг таарах ажлыг<br>өдөр бүр илгээх болно</p>
</div>

<div class="content">

<div class="card">
  <div class="card-header">
    <div class="card-icon">🎯</div>
    <div class="card-title">Чиглэл</div>
    <div class="counter" id="catCounter">0</div>
  </div>
  <div class="chip-grid" id="categories"></div>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-icon">💰</div>
    <div class="card-title">Хүсэх цалин</div>
  </div>
  <div class="salary-display" id="salaryDisplay">3 сая+</div>
  <div class="slider-container">
    <input type="range" min="0" max="10" value="5" step="1" class="salary-slider" id="salary">
    <div class="salary-range">
      <span>0</span>
      <span>15 сая+</span>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-icon">📍</div>
    <div class="card-title">Байршил</div>
  </div>
  <div class="chip-grid" id="locations"></div>
</div>

<div class="card">
  <div class="toggle-row">
    <div class="toggle-info">
      <div class="toggle-label">🏠 Зайнаас ажиллах</div>
      <div class="toggle-desc">Гэрээсээ ажилах боломжтой</div>
    </div>
    <div class="toggle" id="remoteToggle"></div>
  </div>
</div>

</div>

<div class="submit-container">
  <button class="submit-btn" onclick="submit()">Хадгалах →</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const CATEGORIES = {
  it: "💻 МТ",
  finance: "💵 Санхүү",
  hr: "👥 HR",
  marketing: "📢 Маркетинг",
  sales: "🛍 Худалдаа",
  design: "🎨 Дизайн",
  legal: "⚖️ Хууль",
  construction: "🏗 Барилга",
  manufacturing: "🏭 Үйлдвэрлэл",
  mining: "⛏ Уул уурхай",
  logistics: "🚚 Тээвэр",
  agriculture: "🌾 ХАА",
  energy: "⚡ Эрчим хүч",
  auto: "🔧 Авто",
  restaurant: "🍽 Ресторан",
  tourism: "🏨 Зочид буудал",
  health: "🏥 Эрүүл мэнд",
  education: "📚 Боловсрол",
  telecom: "📞 Харилцаа",
  sport: "⚽ Спорт",
  art: "🎭 Урлаг",
  service: "🧹 Үйлчилгээ",
  security: "🛡 Хамгаалалт",
  insurance: "🛡 Даатгал",
  project: "📋 Төсөл",
};

const LOCATIONS = {
  any: "🌐 Хамаагүй",
  ub: "🏙 Улаанбаатар",
  darkhan: "🌆 Дархан",
  erdenet: "🏔 Эрдэнэт",
  countryside: "🌾 Аймагт",
  remote: "💻 Зайнаас",
};

const SALARY_VALUES = [0, 500000, 1000000, 1500000, 2000000, 3000000, 4000000, 5000000, 7000000, 10000000, 15000000];

const state = {
  categories: new Set(),
  salary: 3000000,
  location: 'ub',
  remote: false,
};

const catContainer = document.getElementById('categories');
const catCounter = document.getElementById('catCounter');

Object.entries(CATEGORIES).forEach(([key, name]) => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = name;
  btn.onclick = () => {
    if (state.categories.has(key)) {
      state.categories.delete(key);
      btn.classList.remove('active');
    } else {
      state.categories.add(key);
      btn.classList.add('active');
    }
    catCounter.textContent = state.categories.size;
  };
  catContainer.appendChild(btn);
});

const locContainer = document.getElementById('locations');
Object.entries(LOCATIONS).forEach(([key, name]) => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  if (key === 'ub') btn.classList.add('active');
  btn.textContent = name;
  btn.onclick = () => {
    locContainer.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    state.location = key;
  };
  locContainer.appendChild(btn);
});

const salarySlider = document.getElementById('salary');
const salaryDisplay = document.getElementById('salaryDisplay');

salarySlider.oninput = () => {
  const idx = parseInt(salarySlider.value);
  state.salary = SALARY_VALUES[idx];
  if (state.salary === 0) {
    salaryDisplay.textContent = 'Хязгааргүй';
  } else if (state.salary >= 1000000) {
    salaryDisplay.textContent = `${(state.salary / 1000000)} сая+`;
  } else {
    salaryDisplay.textContent = `${(state.salary / 1000)}K+`;
  }
};

const remoteToggle = document.getElementById('remoteToggle');
remoteToggle.onclick = () => {
  state.remote = !state.remote;
  remoteToggle.classList.toggle('active');
};

function submit() {
  if (state.categories.size === 0) {
    if (tg.showAlert) {
      tg.showAlert('Дор хаяж 1 чиглэл сонгоно уу');
    } else {
      alert('Дор хаяж 1 чиглэл сонгоно уу');
    }
    return;
  }
  
  const data = {
    categories: Array.from(state.categories),
    min_salary: state.salary,
    location: state.location,
    remote_only: state.remote,
  };
  
  if (tg.sendData) {
    tg.sendData(JSON.stringify(data));
    tg.close();
  } else {
    alert(JSON.stringify(data, null, 2));
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ажлын тохиргоо</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--tg-theme-bg-color, #fff);
  color: var(--tg-theme-text-color, #000);
  padding: 16px;
  padding-bottom: 100px;
}
h1 {
  font-size: 22px;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle {
  color: var(--tg-theme-hint-color, #999);
  text-align: center;
  margin-bottom: 24px;
  font-size: 14px;
}
.section {
  margin-bottom: 24px;
}
.section-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--tg-theme-text-color, #000);
}
.chip-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip {
  padding: 10px 16px;
  border: 2px solid var(--tg-theme-button-color, #2481cc);
  border-radius: 20px;
  background: transparent;
  color: var(--tg-theme-text-color, #000);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}
.chip.active {
  background: var(--tg-theme-button-color, #2481cc);
  color: var(--tg-theme-button-text-color, #fff);
}
.salary-slider {
  width: 100%;
  margin: 12px 0;
}
.salary-value {
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  color: var(--tg-theme-button-color, #2481cc);
}
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  background: var(--tg-theme-secondary-bg-color, #f5f5f5);
  border-radius: 12px;
}
.toggle {
  width: 50px;
  height: 28px;
  background: #ccc;
  border-radius: 14px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle.active {
  background: var(--tg-theme-button-color, #2481cc);
}
.toggle::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: white;
  top: 2px;
  left: 2px;
  transition: left 0.2s;
}
.toggle.active::after {
  left: 24px;
}
.submit-btn {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px;
  background: var(--tg-theme-button-color, #2481cc);
  color: var(--tg-theme-button-text-color, #fff);
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.submit-btn:disabled {
  opacity: 0.5;
}
</style>
</head>
<body>

<h1>Ажлын тохиргоо</h1>
<p class="subtitle">Тохирох ажлыг танд илгээх болно</p>

<div class="section">
<div class="section-title">Чиглэл (олон сонгож болно)</div>
<div class="chip-grid" id="categories"></div>
</div>

<div class="section">
<div class="section-title">Хүсэх цалин: <span class="salary-value" id="salaryDisplay">3 сая+</span></div>
<input type="range" min="0" max="10" value="3" step="1" class="salary-slider" id="salary">
</div>

<div class="section">
<div class="section-title">Байршил</div>
<div class="chip-grid" id="locations"></div>
</div>

<div class="section">
<div class="toggle-row">
<span>Зайнаас ажиллах боломжтой</span>
<div class="toggle" id="remoteToggle"></div>
</div>
</div>

<button class="submit-btn" id="submitBtn" onclick="submit()">Хадгалах</button>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const CATEGORIES = {
  it: "МТ",
  finance: "Санхүү",
  hr: "Хүний нөөц",
  marketing: "Маркетинг",
  sales: "Худалдаа",
  design: "Дизайн",
  legal: "Хууль",
  construction: "Барилга",
  manufacturing: "Үйлдвэрлэл",
  mining: "Уул уурхай",
  logistics: "Тээвэр",
  agriculture: "ХАА",
  energy: "Эрчим хүч",
  auto: "Авто",
  restaurant: "Ресторан",
  tourism: "Зочид буудал",
  health: "Эрүүл мэнд",
  education: "Боловсрол",
  telecom: "Харилцаа холбоо",
  sport: "Спорт",
  art: "Урлаг",
  service: "Үйлчилгээ",
  security: "Хамгаалалт",
  insurance: "Даатгал",
  project: "Төсөл",
};

const LOCATIONS = {
  any: "Хамаагүй",
  ub: "Улаанбаатар",
  darkhan: "Дархан",
  erdenet: "Эрдэнэт",
  countryside: "Аймагт",
  remote: "Зайнаас",
};

const SALARY_VALUES = [0, 500000, 1000000, 1500000, 2000000, 3000000, 4000000, 5000000, 7000000, 10000000, 15000000];

const state = {
  categories: new Set(),
  salary: 3000000,
  location: 'ub',
  remote: false,
};

// Категориуд
const catContainer = document.getElementById('categories');
Object.entries(CATEGORIES).forEach(([key, name]) => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = name;
  btn.onclick = () => {
    if (state.categories.has(key)) {
      state.categories.delete(key);
      btn.classList.remove('active');
    } else {
      state.categories.add(key);
      btn.classList.add('active');
    }
  };
  catContainer.appendChild(btn);
});

// Байршил
const locContainer = document.getElementById('locations');
Object.entries(LOCATIONS).forEach(([key, name]) => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  if (key === 'ub') btn.classList.add('active');
  btn.textContent = name;
  btn.onclick = () => {
    locContainer.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    state.location = key;
  };
  locContainer.appendChild(btn);
});

// Цалин
const salarySlider = document.getElementById('salary');
const salaryDisplay = document.getElementById('salaryDisplay');
salarySlider.oninput = () => {
  const idx = parseInt(salarySlider.value);
  state.salary = SALARY_VALUES[idx];
  if (state.salary === 0) {
    salaryDisplay.textContent = 'Хязгааргүй';
  } else if (state.salary >= 1000000) {
    salaryDisplay.textContent = `${(state.salary / 1000000)} сая+`;
  } else {
    salaryDisplay.textContent = `${(state.salary / 1000)}K+`;
  }
};

// Remote toggle
const remoteToggle = document.getElementById('remoteToggle');
remoteToggle.onclick = () => {
  state.remote = !state.remote;
  remoteToggle.classList.toggle('active');
};

function submit() {
  if (state.categories.size === 0) {
    tg.showAlert('Дор хаяж 1 чиглэл сонгоно уу');
    return;
  }
  
  const data = {
    categories: Array.from(state.categories),
    min_salary: state.salary,
    location: state.location,
    remote_only: state.remote,
  };
  
  tg.sendData(JSON.stringify(data));
  tg.close();
}
</script>

</body>
</html>

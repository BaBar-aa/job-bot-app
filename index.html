<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ажлын тохиргоо</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fafbfc;
  color: #0a0e27;
  padding-bottom: 110px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.hero {
  position: relative;
  min-height: 280px;
  background: 
    linear-gradient(135deg, rgba(10, 14, 39, 0.85) 0%, rgba(30, 58, 138, 0.75) 100%),
    url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=1200&q=80') center/cover;
  padding: 48px 24px 80px;
  color: white;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 40px;
  background: #fafbfc;
  border-radius: 32px 32px 0 0;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.hero-badge-dot {
  width: 6px;
  height: 6px;
  background: #34d399;
  border-radius: 50%;
  box-shadow: 0 0 8px #34d399;
}

.hero h1 {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 12px;
  letter-spacing: -1px;
  line-height: 1.1;
}

.hero p {
  font-size: 15px;
  opacity: 0.85;
  line-height: 1.6;
  max-width: 380px;
  font-weight: 400;
}

.content {
  padding: 0 16px;
  margin-top: -40px;
  position: relative;
  z-index: 2;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 12px;
  padding: 0 4px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 16px;
  border: 1px solid rgba(15, 23, 42, 0.06);
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(15, 23, 42, 0.04);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.card-title {
  font-size: 17px;
  font-weight: 700;
  color: #0a0e27;
  letter-spacing: -0.3px;
}

.counter {
  background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
  color: white;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  min-width: 32px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
}

.chip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}

.chip {
  padding: 12px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  background: white;
  color: #475569;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s ease;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 8px;
  text-align: left;
}

.chip svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: #94a3b8;
  transition: color 0.2s;
}

.chip:hover {
  border-color: #2563eb;
  color: #0a0e27;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
}

.chip:hover svg {
  color: #2563eb;
}

.chip.active {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-color: #0f172a;
  color: white;
  box-shadow: 0 4px 16px rgba(15, 23, 42, 0.3);
}

.chip.active svg {
  color: #60a5fa;
}

.location-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.location-chip {
  padding: 12px;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  background: white;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.location-chip:hover {
  border-color: #2563eb;
  transform: translateY(-1px);
}

.location-chip.active {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-color: #0f172a;
  color: white;
}

.location-icon {
  font-size: 22px;
  margin-bottom: 4px;
  display: block;
}

.location-name {
  font-size: 13px;
  font-weight: 600;
}

.salary-display {
  text-align: center;
  font-size: 42px;
  font-weight: 800;
  margin: 16px 0 24px;
  background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -2px;
  line-height: 1;
}

.slider-container {
  padding: 0 4px;
}

.salary-slider {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: linear-gradient(90deg, #dbeafe 0%, #93c5fd 100%);
  appearance: none;
  outline: none;
}

.salary-slider::-webkit-slider-thumb {
  appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: white;
  cursor: pointer;
  border: 4px solid #2563eb;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
}

.salary-range {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  font-size: 12px;
  color: #94a3b8;
  font-weight: 500;
}

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.toggle-info { flex: 1; }

.toggle-label {
  font-size: 16px;
  font-weight: 700;
  color: #0a0e27;
  margin-bottom: 4px;
}

.toggle-desc {
  font-size: 13px;
  color: #64748b;
  line-height: 1.4;
}

.toggle {
  width: 52px;
  height: 30px;
  background: #e2e8f0;
  border-radius: 16px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
  flex-shrink: 0;
}

.toggle.active {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
}

.toggle::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: white;
  top: 3px;
  left: 3px;
  transition: left 0.3s;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
}

.toggle.active::after {
  left: 25px;
}

.submit-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(15, 23, 42, 0.08);
  z-index: 10;
}

.submit-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.25);
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(15, 23, 42, 0.35);
}

.submit-btn:active { transform: scale(0.98); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">
    <span class="hero-badge-dot"></span>
    AI-аар хувийн тохиргоо
  </div>
  <h1>Зөв ажлыг<br>зөв хүнд</h1>
  <p>Танай нөөц, туршлага, чиглэлд яг таарах ажлыг өдөр бүр Telegram-аар хүлээн авна уу.</p>
</div>

<div class="content">

<div class="section-label">Шаардлагатай талбарууд</div>

<div class="card">
  <div class="card-header">
    <div class="card-title">Чиглэл</div>
    <div class="counter" id="catCounter">0</div>
  </div>
  <div class="chip-grid" id="categories"></div>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-title">Хүсэх цалин</div>
  </div>
  <div class="salary-display" id="salaryDisplay">3 сая+</div>
  <div class="slider-container">
    <input type="range" min="0" max="10" value="5" step="1" class="salary-slider" id="salary">
    <div class="salary-range">
      <span>Хязгааргүй</span>
      <span>15 сая+</span>
    </div>
  </div>
</div>

<div class="section-label">Нэмэлт сонголтууд</div>

<div class="card">
  <div class="card-header">
    <div class="card-title">Байршил</div>
  </div>
  <div class="location-grid" id="locations"></div>
</div>

<div class="card">
  <div class="toggle-row">
    <div class="toggle-info">
      <div class="toggle-label">Зайнаас ажиллах</div>
      <div class="toggle-desc">Гэрээсээ ажилах боломжтой зар хүсэж байвал асаа</div>
    </div>
    <div class="toggle" id="remoteToggle"></div>
  </div>
</div>

</div>

<div class="submit-container">
  <button class="submit-btn" onclick="submit()">Тохиргоог хадгалах</button>
</div>

  ['logistics', 'Тээвэр', 'truck'],
  ['agriculture', 'ХАА', 'leaf'],
  ['energy', 'Эрчим хүч', 'bolt'],
  ['auto', 'Авто', 'wrench'],

  ['tourism', 'Зочид буудал', 'hotel'],
  ['health', 'Эрүүл мэнд', 'heart'],

  ['telecom', 'Харилцаа холбоо', 'phone'],

  ['security', 'Хамгаалалт', 'shield'],

  ['project', 'Төсөл', 'clipboard'],
];

const LOCATIONS = [
  ['any', 'Хамаагүй', '🌍'],
  ['ub', 'Улаанбаатар', '🏙️'],
  ['darkhan', 'Дархан', '🏘️'],
  ['erdenet', 'Эрдэнэт', '⛰️'],
  ['countryside', 'Аймагт', '🏞️'],
  ['remote', 'Зайнаас', '🌐'],
];

const SALARY_VALUES = [0, 500000, 1000000, 1500000, 2000000, 3000000, 4000000, 5000000, 7000000, 10000000, 15000000];

const state = {
  categories: new Set(),
  salary: 3000000,
  location: 'ub',
  remote: false,
};

const catContainer = document.getElementById('categories');
const catCounter = document.getElementById('catCounter');

CATEGORIES.forEach(([key, name, iconName]) => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.innerHTML = `${ICON[iconName] || ''}<span>${name}</span>`;
  btn.onclick = () => {
    if (state.categories.has(key)) {
      state.categories.delete(key);
      btn.classList.remove('active');
    } else {
      state.categories.add(key);
      btn.classList.add('active');
    }
    catCounter.textContent = state.categories.size;
  };
  catContainer.appendChild(btn);
});

const locContainer = document.getElementById('locations');
LOCATIONS.forEach(([key, name, icon]) => {
  const btn = document.createElement('button');
  btn.className = 'location-chip';
  if (key === 'ub') btn.classList.add('active');
  btn.innerHTML = `<span class="location-icon">${icon}</span><div class="location-name">${name}</div>`;
  btn.onclick = () => {
    locContainer.querySelectorAll('.location-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    state.location = key;
  };
  locContainer.appendChild(btn);
});

const salarySlider = document.getElementById('salary');
const salaryDisplay = document.getElementById('salaryDisplay');

salarySlider.oninput = () => {
  const idx = parseInt(salarySlider.value);
  state.salary = SALARY_VALUES[idx];
  if (state.salary === 0) {
    salaryDisplay.textContent = 'Хязгааргүй';
  } else if (state.salary >= 1000000) {
    salaryDisplay.textContent = `${(state.salary / 1000000)} сая+`;
  } else {
    salaryDisplay.textContent = `${(state.salary / 1000)}K+`;
  }
};

const remoteToggle = document.getElementById('remoteToggle');
remoteToggle.onclick = () => {
  state.remote = !state.remote;
  remoteToggle.classList.toggle('active');
};

function submit() {
  if (state.categories.size === 0) {
    if (tg.showAlert) tg.showAlert('Дор хаяж 1 чиглэл сонгоно уу');
    else alert('Дор хаяж 1 чиглэл сонгоно уу');
    return;
  }
  
  const data = {
    categories: Array.from(state.categories),
    min_salary: state.salary,
    location: state.location,
    remote_only: state.remote,
  };
  
  if (tg.sendData) {
    tg.sendData(JSON.stringify(data));
    tg.close();
  } else {
    alert(JSON.stringify(data, null, 2));
  }
}
</script>
